name: Client Deploy Contract

on:
  pull_request:
    paths:
      - "config/**"
      - "scripts/client-*.mjs"
      - "scripts/import-client-payload.mjs"
      - "scripts/generate-client-*.mjs"
      - "scripts/validate-client-manifest.mjs"
      - "Makefile"
      - "package.json"
      - "pnpm-lock.yaml"
      - "docs/install/custom-client-*.md"
      - ".github/workflows/client-deploy-contract.yml"
  push:
    branches: [main]
    paths:
      - "config/**"
      - "scripts/client-*.mjs"
      - "scripts/import-client-payload.mjs"
      - "scripts/generate-client-*.mjs"
      - "scripts/validate-client-manifest.mjs"
      - "Makefile"
      - "package.json"
      - "pnpm-lock.yaml"
      - "docs/install/custom-client-*.md"
      - ".github/workflows/client-deploy-contract.yml"

concurrency:
  group: client-deploy-contract-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  contract-check:
    runs-on: blacksmith-16vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          fetch-tags: false
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"
          use-sticky-disk: "false"

      - name: Run client deploy contract checks
        run: pnpm client:check
